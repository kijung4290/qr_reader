<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>경로식당 QR 출석</title>
    <meta name="description" content="경로식당 QR코드 출석 스캐너" />
    <meta name="theme-color" content="#0b0c0f" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        /* ===== Design Tokens ===== */
        :root {
            --blue: #3182f6;
            --blue-deep: #1b64da;
            --blue-weak: #e8f3ff;
            --blue-glow: rgba(49, 130, 246, 0.35);
            --green: #20c997;
            --green-bg: #e6fcf5;
            --red: #f03e3e;
            --red-bg: #fff5f5;
            --gradient: linear-gradient(135deg, #3182f6 0%, #6366f1 100%);

            --text-strong: #f9fafb;
            --text: #e5e7eb;
            --text-weak: #9ca3af;
            --bg: #0b0c0f;
            --bg-elevated: #111318;
            --panel: #17191e;
            --panel-hover: #1e2028;
            --border: #252830;

            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, .55);
            --font: 'Pretendard Variable', 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        .app {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Header ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            background: rgba(11, 12, 15, .8);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 480px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            box-shadow: 0 2px 12px rgba(49, 130, 246, 0.4);
        }

        .header-title {
            font-weight: 800;
            font-size: 17px;
            color: var(--text-strong);
            letter-spacing: -.3px;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text-weak);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all .15s ease;
        }

        .btn-icon:hover {
            background: var(--panel-hover);
            color: var(--text-strong);
        }

        /* ===== Main Content ===== */
        .main {
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== Scanner Section ===== */
        .scanner-wrap {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .scanner-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .scanner-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-weak);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-weak);
            transition: background .3s ease;
        }

        .status-dot.active {
            background: var(--green);
            box-shadow: 0 0 8px rgba(32, 201, 151, 0.5);
            animation: pulse-dot 2s ease infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 4px rgba(32, 201, 151, 0.3);
            }

            50% {
                box-shadow: 0 0 12px rgba(32, 201, 151, 0.6);
            }
        }

        .scan-count-badge {
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(49, 130, 246, 0.15);
            color: var(--blue);
            font-size: 13px;
            font-weight: 700;
        }

        #scanner-container {
            width: 100%;
            min-height: 300px;
            background: #000;
            position: relative;
        }

        /* QR scanner 라이브러리 스타일 재정의 */
        #scanner-container img[alt="Info icon"] {
            display: none !important;
        }

        #scanner-container video {
            width: 100% !important;
            max-height: 70vh !important;
        }

        /* 전면 카메라 거울 모드 (좌우 반전) */
        #scanner-container.mirrored video {
            transform: scaleX(-1) !important;
        }

        /* 스캔 영역 테두리 오버레이 (CSS로 직접 그림) */
        .scanner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
        }

        .scan-frame {
            width: 75%;
            aspect-ratio: 1;
            max-width: 320px;
            position: relative;
        }

        .scan-frame::before,
        .scan-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--blue);
            border-style: solid;
        }

        .scan-frame::before {
            top: 0;
            left: 0;
            border-width: 4px 0 0 4px;
            border-radius: 8px 0 0 0;
        }

        .scan-frame::after {
            top: 0;
            right: 0;
            border-width: 4px 4px 0 0;
            border-radius: 0 8px 0 0;
        }

        .scan-frame-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
        }

        .scan-frame-bottom::before,
        .scan-frame-bottom::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--blue);
            border-style: solid;
        }

        .scan-frame-bottom::before {
            bottom: 0;
            left: 0;
            border-width: 0 0 4px 4px;
            border-radius: 0 0 0 8px;
        }

        .scan-frame-bottom::after {
            bottom: 0;
            right: 0;
            border-width: 0 4px 4px 0;
            border-radius: 0 0 8px 0;
        }

        .scan-line {
            position: absolute;
            left: 5%;
            right: 5%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            animation: scan-move 2.5s ease-in-out infinite;
            box-shadow: 0 0 12px var(--blue-glow);
            top: 50%;
        }

        @keyframes scan-move {

            0%,
            100% {
                transform: translateY(-100px);
            }

            50% {
                transform: translateY(100px);
            }
        }

        /* ===== Idle State (카메라 꺼짐) ===== */
        .idle-view {
            width: 100%;
            aspect-ratio: 1;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(180deg, #111318 0%, #0b0c0f 100%);
        }

        .idle-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(49, 130, 246, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .idle-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-weak);
        }

        .btn-start {
            padding: 14px 32px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--gradient);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(49, 130, 246, 0.35);
            transition: transform .1s ease, box-shadow .2s ease;
            font-family: var(--font);
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        /* ===== Result Toast ===== */
        .result-container {
            overflow: hidden;
            transition: max-height .4s ease, opacity .3s ease;
            max-height: 0;
            opacity: 0;
        }

        .result-container.show {
            max-height: 200px;
            opacity: 1;
        }

        .result-card {
            padding: 20px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: slideUp .3s ease;
        }

        .result-card.success {
            background: linear-gradient(135deg, rgba(32, 201, 151, 0.12) 0%, rgba(32, 201, 151, 0.04) 100%);
            border: 1px solid rgba(32, 201, 151, 0.25);
        }

        .result-card.error {
            background: linear-gradient(135deg, rgba(240, 62, 62, 0.12) 0%, rgba(240, 62, 62, 0.04) 100%);
            border: 1px solid rgba(240, 62, 62, 0.25);
        }

        .result-card.duplicate {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.12) 0%, rgba(255, 193, 7, 0.04) 100%);
            border: 1px solid rgba(255, 193, 7, 0.25);
        }

        .result-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .result-card.success .result-icon {
            background: rgba(32, 201, 151, 0.15);
        }

        .result-card.error .result-icon {
            background: rgba(240, 62, 62, 0.15);
        }

        .result-card.duplicate .result-icon {
            background: rgba(255, 193, 7, 0.15);
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-strong);
            letter-spacing: -.3px;
        }

        .result-msg {
            font-size: 14px;
            color: var(--text-weak);
            margin-top: 2px;
        }

        .result-countdown {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .result-countdown-bar {
            height: 100%;
            border-radius: 2px;
            transition: width .1s linear;
        }

        .result-card.success .result-countdown-bar {
            background: var(--green);
        }

        .result-card.error .result-countdown-bar {
            background: var(--red);
        }

        .result-card.duplicate .result-countdown-bar {
            background: #ffc107;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== History ===== */
        .history-section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .history-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .history-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-strong);
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--text-weak);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: var(--font);
        }

        .btn-clear:hover {
            color: var(--red);
            background: rgba(240, 62, 62, 0.08);
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-empty {
            padding: 32px 20px;
            text-align: center;
            color: var(--text-weak);
            font-size: 14px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            animation: fadeIn .2s ease;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-strong);
        }

        .history-time {
            font-size: 12px;
            color: var(--text-weak);
            margin-top: 1px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ===== Settings Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform .3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-strong);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-weak);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text-strong);
            outline: none;
            font-family: var(--font);
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        .form-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.15);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-weak);
            margin-top: 6px;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--gradient);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            font-family: var(--font);
            margin-top: 8px;
            transition: transform .1s ease;
        }

        .btn-save:active {
            transform: scale(0.97);
        }

        /* ===== Footer ===== */
        .footer {
            max-width: 480px;
            margin: 0 auto 28px;
            padding: 0 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-weak);
        }

        .footer a {
            color: var(--blue);
            text-decoration: none;
        }

        /* ===== Processing overlay ===== */
        .processing {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
        }

        .processing.show {
            opacity: 1;
            pointer-events: auto;
        }

        .processing-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--blue);
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .processing-text {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        /* ===== Camera Toggle ===== */
        .camera-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-camera-switch {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text-weak);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all .15s ease;
            white-space: nowrap;
        }

        .btn-camera-switch.show {
            display: inline-flex;
        }

        .btn-camera-switch:hover {
            background: var(--panel-hover);
            color: var(--text-strong);
            border-color: var(--blue);
        }

        .btn-camera-switch:active {
            transform: scale(0.96);
        }

        .camera-label {
            font-size: 12px;
            color: var(--text-weak);
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(49, 130, 246, 0.12);
            color: var(--blue);
            font-weight: 600;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo">🍚</div>
                <div class="header-title">경로식당 QR 출석</div>
                <div class="header-right">
                    <!-- 하드코딩으로 변경하여 설정 버튼 제거됨 -->
                </div>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <!-- Scanner -->
            <div class="scanner-wrap">
                <div class="scanner-header">
                    <div class="scanner-status">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">대기 중</span>
                    </div>
                    <div class="scan-count-badge" id="scanCountBadge">오늘 0건</div>
                </div>

                <!-- Idle View -->
                <div class="idle-view" id="idleView">
                    <div class="idle-icon">📷</div>
                    <div class="idle-text">카메라를 켜고 QR코드를 스캔하세요</div>
                    <button class="btn-start" id="btnToggleScan" onclick="toggleScanner()">카메라 시작</button>
                </div>

                <!-- Scanner View -->
                <div id="scannerView" style="display:none; position:relative;">
                    <div id="scanner-container"></div>
                    <div class="scanner-overlay">
                        <div class="scan-frame">
                            <div class="scan-line"></div>
                            <div class="scan-frame-bottom"></div>
                        </div>
                    </div>
                    <div class="processing" id="processing">
                        <div class="processing-spinner"></div>
                        <div class="processing-text">출석 처리 중...</div>
                    </div>
                </div>

                <!-- 하단 안내 -->
                <div
                    style="padding: 14px 20px; display:flex; align-items:center; justify-content:center; gap:12px; border-top: 1px solid var(--border);">
                    <button id="btnToggleScanBottom" onclick="toggleScanner()"
                        style="background:none; border:none; color:var(--red); font-weight:700; font-size:15px; cursor:pointer; font-family:var(--font); display:none;">
                        ⏹ 카메라 끄기
                    </button>
                    <button id="btnCameraSwitch" class="btn-camera-switch" onclick="switchCamera()">
                        🔄 카메라 전환 <span class="camera-label" id="cameraLabel">후면</span>
                    </button>
                    <span id="scanHint" style="font-size:13px; color:var(--text-weak);">
                        버튼을 눌러 카메라를 시작하세요
                    </span>
                </div>
            </div>

            <!-- Result -->
            <div class="result-container" id="resultContainer">
                <div class="result-card" id="resultCard">
                    <div class="result-icon" id="resultIcon">✅</div>
                    <div class="result-info">
                        <div class="result-name" id="resultName">-</div>
                        <div class="result-msg" id="resultMsg">-</div>
                    </div>
                </div>
                <div class="result-countdown" id="resultCountdown" style="display:none;">
                    <div class="result-countdown-bar" id="resultCountdownBar" style="width:100%;"></div>
                </div>
            </div>

            <!-- History -->
            <div class="history-section">
                <div class="history-header">
                    <div class="history-title">📋 오늘 스캔 기록</div>
                    <button class="btn-clear" onclick="clearHistory()">전체 삭제</button>
                </div>
                <div class="history-empty" id="historyEmpty">아직 스캔 기록이 없습니다</div>
                <div class="history-list" id="historyList">
                </div>
            </div>
        </main>

        <footer class="footer">
            경로식당 QR 출석 스캐너 · iframe 제약 없는 독립 앱
        </footer>
    </div>

    <!-- Audio: 성공 비프음을 Web Audio API로 생성 -->
    <script>
        // ===== Configuration =====
        // 통합출석체크 메인 앱에서 program, endpoint/webAppUrl을 붙여 열면 그 값을 우선 사용합니다.
        const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbznZD9I67yHJVzJsBo0LowFPNlvP9BbEOlEJ5wSRkFrYLybi5c6PW8y3eB-ZNnjhK_yzQ/exec';
        const SCANNER_PARAMS = new URLSearchParams(window.location.search);
        const PROGRAM_NAME = SCANNER_PARAMS.get('program') || SCANNER_PARAMS.get('programName') || '경로식당';
        const GAS_URL = SCANNER_PARAMS.get('endpoint')
            || SCANNER_PARAMS.get('scriptUrl')
            || SCANNER_PARAMS.get('apiUrl')
            || SCANNER_PARAMS.get('webAppUrl')
            || DEFAULT_GAS_URL;
        const RESUME_DELAY = 3000; // 스캔 대기 시간 3초

        // ===== State =====
        const $ = id => document.getElementById(id);
        let scanner = null;
        let isScanning = false;
        let isProcessing = false;
        const storagePrefix = `scan:${PROGRAM_NAME}:`;
        let scanCount = parseInt(sessionStorage.getItem(storagePrefix + 'count') || '0');
        let history = JSON.parse(sessionStorage.getItem(storagePrefix + 'history') || '[]');
        let countdownTimer = null;
        let jsonpCounter = 0;

        // ===== Camera State =====
        let cameraList = [];        // 사용 가능한 카메라 목록
        let currentCameraIndex = 0; // 현재 선택된 카메라 인덱스
        let currentFacing = 'environment'; // 현재 카메라 방향

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            applyProgramUi();
            updateScanCount();
            renderHistory();
            // 카메라 목록 미리 로드
            loadCameraList();
        });

        function applyProgramUi() {
            const title = `${PROGRAM_NAME} QR 출석`;
            document.title = title;
            const headerTitle = document.querySelector('.header-title');
            if (headerTitle) headerTitle.textContent = title;
            const description = document.querySelector('meta[name="description"]');
            if (description) description.setAttribute('content', `${PROGRAM_NAME} QR코드 출석 스캐너`);
            const footer = document.querySelector('.footer');
            if (footer) footer.textContent = `${PROGRAM_NAME} QR 출석 스캐너 · iframe 제약 없는 독립 앱`;
        }

        // 카메라 목록 로드
        async function loadCameraList() {
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    cameraList = devices;
                    console.log('카메라 목록:', devices.map(d => d.label || d.id));

                    // 후면 카메라를 기본으로 찾기
                    const backIdx = devices.findIndex(d =>
                        d.label && (d.label.toLowerCase().includes('back') ||
                            d.label.toLowerCase().includes('rear') ||
                            d.label.toLowerCase().includes('환경') ||
                            d.label.toLowerCase().includes('후면'))
                    );
                    if (backIdx !== -1) currentCameraIndex = backIdx;
                }
            } catch (e) {
                console.log('카메라 목록 로드 실패 (권한 필요):', e);
            }
        }

        // ===== Scanner Toggle =====
        function toggleScanner() {
            if (isScanning) {
                stopScanner();
            } else {
                startScanner();
            }
        }

        function startScanner(useCameraId) {
            $('idleView').style.display = 'none';
            $('scannerView').style.display = 'block';
            $('btnToggleScanBottom').style.display = 'inline';
            $('scanHint').style.display = 'none';

            scanner = new Html5Qrcode('scanner-container');

            // 인식 속도 극대화 설정
            const config = {
                fps: 30, // 스캔 주기 단축 (초당 30프레임)
                formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE], // 바코드 등을 찾지 않고 QR에만 모든 성능 집중
                disableFlip: false,
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                }
            };

            // 스캔 실패 콜백 (필수 — 없으면 라이브러리 내부 에러 발생 가능)
            const onScanFailure = (errorMessage) => {
                // 매 프레임 실패를 무시 (QR이 없는 프레임은 정상적으로 실패함)
            };

            // 카메라 선택: ID가 지정되면 ID로, 아니면 facingMode로
            let cameraConfig;
            if (useCameraId) {
                cameraConfig = useCameraId;
            } else if (cameraList.length > 0) {
                cameraConfig = cameraList[currentCameraIndex].id;
            } else {
                cameraConfig = { facingMode: currentFacing };
            }

            scanner.start(
                cameraConfig,
                config,
                onScanSuccess,
                onScanFailure
            ).then(() => {
                isScanning = true;
                updateCameraUI();
                setStatus('스캔 대기 중', true);

                // 카메라 목록이 아직 없으면 다시 로드 (권한 허용 후)
                if (cameraList.length === 0) {
                    loadCameraList().then(() => updateCameraUI());
                }
            }).catch(err => {
                console.error('Camera start failed:', err);

                // facingMode로 재시도
                if (typeof cameraConfig !== 'string' || cameraList.length === 0) {
                    // 전면 카메라로 fallback
                    const fallbackFacing = currentFacing === 'environment' ? 'user' : 'environment';
                    scanner.start(
                        { facingMode: fallbackFacing },
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).then(() => {
                        isScanning = true;
                        currentFacing = fallbackFacing;
                        updateCameraUI();
                        setStatus('스캔 대기 중', true);
                        loadCameraList().then(() => updateCameraUI());
                    }).catch(err2 => {
                        setStatus('카메라를 사용할 수 없습니다', false);
                        alert('카메라 접근이 거부되었습니다.\n브라우저 설정에서 카메라 권한을 허용해주세요.');
                        stopScannerUI();
                    });
                } else {
                    // 다른 카메라로 재시도
                    currentCameraIndex = (currentCameraIndex + 1) % cameraList.length;
                    startScanner(cameraList[currentCameraIndex].id);
                }
            });
        }

        // 카메라 전환
        async function switchCamera() {
            if (!isScanning || cameraList.length < 2) {
                // 카메라 목록이 없으면 facingMode 토글
                currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
                if (isScanning) {
                    await scanner.stop();
                    scanner.clear();
                    isScanning = false;
                    startScanner();
                }
                return;
            }

            // 다음 카메라로 순환
            currentCameraIndex = (currentCameraIndex + 1) % cameraList.length;
            const nextCamera = cameraList[currentCameraIndex];

            setStatus('카메라 전환 중...', false);

            try {
                await scanner.stop();
                scanner.clear();
                isScanning = false;
                startScanner(nextCamera.id);
            } catch (e) {
                console.error('카메라 전환 실패:', e);
                startScanner();
            }
        }

        // 카메라 UI 업데이트
        function updateCameraUI() {
            const switchBtn = $('btnCameraSwitch');
            const label = $('cameraLabel');

            // 카메라 전환 버튼 표시
            switchBtn.classList.add('show');
            let isFront = false;

            if (cameraList.length > 0) {
                const currentCam = cameraList[currentCameraIndex];
                const camLabel = currentCam.label || `카메라 ${currentCameraIndex + 1}`;

                // 카메라 이름에서 전면/후면 추출
                if (camLabel.toLowerCase().includes('back') || camLabel.toLowerCase().includes('rear') ||
                    camLabel.toLowerCase().includes('후면') || camLabel.includes('0')) {
                    label.textContent = `후면`;
                } else if (camLabel.toLowerCase().includes('front') || camLabel.toLowerCase().includes('user') ||
                    camLabel.toLowerCase().includes('webcam') || camLabel.toLowerCase().includes('전면')) {
                    label.textContent = `전면`;
                    isFront = true;
                } else {
                    label.textContent = `${currentCameraIndex + 1}/${cameraList.length}`;
                    // 카메라가 1개뿐이라면 보통 노트북 웹캠(전면)
                    if (cameraList.length === 1) isFront = true;
                }
            } else {
                label.textContent = currentFacing === 'environment' ? '후면' : '전면';
                if (currentFacing === 'user') isFront = true;
            }

            // 전면 카메라(웹캠)일 경우 거울 모드 적용
            if (isFront) {
                $('scanner-container').classList.add('mirrored');
            } else {
                $('scanner-container').classList.remove('mirrored');
            }
        }

        function stopScanner() {
            if (scanner) {
                scanner.stop().then(() => {
                    scanner.clear();
                    stopScannerUI();
                }).catch(err => {
                    console.error('Failed to stop scanner:', err);
                    stopScannerUI();
                });
            }
        }

        function stopScannerUI() {
            isScanning = false;
            $('idleView').style.display = '';
            $('scannerView').style.display = 'none';
            $('btnToggleScanBottom').style.display = 'none';
            $('btnCameraSwitch').classList.remove('show');
            $('scanHint').style.display = '';
            setStatus('대기 중', false);
            hideResult();
        }

        // ===== QR Scan Callback =====
        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // 진동 피드백
            if (navigator.vibrate) navigator.vibrate(100);
            // 소리 피드백
            playBeep();

            const targetId = extractQrPayload(decodedText);

            setStatus('출석 처리 중...', true);
            $('processing').classList.add('show');

            // JSONP 호출
            callGasJsonp(targetId);
        }

        function extractQrPayload(decodedText) {
            const text = String(decodedText || '').trim();
            if (!text) return '';

            if (text.startsWith('http')) {
                try {
                    const url = new URL(text);
                    const value = url.searchParams.get('id')
                        || url.searchParams.get('qr')
                        || url.searchParams.get('data')
                        || url.searchParams.get('value');
                    if (value) return value;
                } catch (e) {
                    console.error('URL parse failed:', e);
                }
            }

            return text;
        }

        // ===== JSONP Communication =====
        function callGasJsonp(id) {
            const currentCounter = ++jsonpCounter;
            const callbackName = '__qrCallback_' + currentCounter;
            const scriptId = 'jsonp_' + currentCounter;
            const timeoutMs = 15000;
            let isResolved = false;

            // 통신 완료 후 정리 함수 (성공, 에러, 타임아웃 공통)
            const cleanup = () => {
                isResolved = true;
                delete window[callbackName];
                const scriptEl = document.getElementById(scriptId);
                if (scriptEl) scriptEl.remove();
                $('processing').classList.remove('show');
            };

            // 콜백 함수 등록
            window[callbackName] = function (data) {
                if (isResolved) return;
                clearTimeout(timeout);
                cleanup();

                if (data && data.success) {
                    // 성공 응답이지만 메시지에 '이미'가 포함된 경우(중복 출석)
                    if (data.message && data.message.includes('이미')) {
                        showResult('duplicate', data.message);
                    } else {
                        showResult('success', data.message);
                    }
                } else {
                    showResult('error', data ? data.message : '알 수 없는 오류');
                }

                addHistory(id, data);
                scheduleResume();
            };

            // 타임아웃 처리
            const timeout = setTimeout(() => {
                if (isResolved) return;
                cleanup();
                showResult('error', '서버 응답 시간 초과. 인터넷 연결을 확인해주세요.');
                scheduleResume();
            }, timeoutMs);

            // 스크립트 태그 생성
            const script = document.createElement('script');
            script.id = scriptId;
            const sep = GAS_URL.includes('?') ? '&' : '?';
            script.src = `${GAS_URL}${sep}id=${encodeURIComponent(id)}&program=${encodeURIComponent(PROGRAM_NAME)}&callback=${callbackName}`;
            script.onerror = () => {
                if (isResolved) return;
                clearTimeout(timeout);
                cleanup();
                showResult('error', '서버에 연결할 수 없습니다. URL을 확인해주세요.');
                scheduleResume();
            };

            document.head.appendChild(script);
        }

        // ===== Result Display =====
        function showResult(type, message) {
            const container = $('resultContainer');
            const card = $('resultCard');
            const icon = $('resultIcon');
            const name = $('resultName');
            const msg = $('resultMsg');

            // 메시지에서 이름 추출 (예: "홍길동님의 출석이 완료되었습니다.")
            let displayName = '';
            let displayMsg = message || '';

            const nameMatch = message ? message.match(/^(.+?)님/) : null;
            if (nameMatch) {
                displayName = nameMatch[1] + '님';
                displayMsg = message.replace(/^.+?님/, '').replace(/^[은의이가] /, '');
            }

            card.className = 'result-card ' + type;

            if (type === 'success') {
                icon.textContent = '✅';
                name.textContent = displayName || '출석 완료';
                msg.textContent = displayMsg || '출석이 완료되었습니다.';
            } else if (type === 'duplicate') {
                icon.textContent = '⚡';
                name.textContent = displayName || '이미 출석';
                msg.textContent = displayMsg || '이미 출석 처리되었습니다.';
            } else {
                icon.textContent = '❌';
                name.textContent = '오류 발생';
                msg.textContent = displayMsg || '다시 시도해주세요.';
            }

            container.classList.add('show');

            // 카운트다운 바
            startCountdown(type);
        }

        function hideResult() {
            $('resultContainer').classList.remove('show');
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function startCountdown(type) {
            const countdown = $('resultCountdown');
            const bar = $('resultCountdownBar');
            countdown.style.display = 'block';
            bar.style.width = '100%';

            const totalSteps = 50;
            let step = totalSteps;

            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                step--;
                bar.style.width = (step / totalSteps * 100) + '%';
                if (step <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    countdown.style.display = 'none';
                }
            }, RESUME_DELAY / totalSteps);
        }

        function scheduleResume() {
            setTimeout(() => {
                isProcessing = false;
                if (isScanning) {
                    setStatus('다음 분 QR을 비춰주세요', true);
                }
                // 결과 자동 숨김
                setTimeout(() => hideResult(), 500);
            }, RESUME_DELAY);
        }

        // ===== Status =====
        function setStatus(text, active) {
            $('statusText').textContent = text;
            $('statusDot').classList.toggle('active', active);
        }

        // ===== Scan Counter =====
        function updateScanCount() {
            $('scanCountBadge').textContent = `오늘 ${scanCount}건`;
        }

        function incrementScanCount() {
            scanCount++;
            sessionStorage.setItem(storagePrefix + 'count', scanCount);
            updateScanCount();
        }

        // ===== History =====
        function addHistory(id, data) {
            incrementScanCount();

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = {
                id: id,
                message: data ? data.message : '알 수 없음',
                success: data ? data.success : false,
                time: timeStr,
            };

            history.unshift(entry);
            if (history.length > 50) history.pop();
            sessionStorage.setItem(storagePrefix + 'history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = $('historyList');
            const empty = $('historyEmpty');

            if (history.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = history.map(h => {
                const icon = h.success ? '✅' : (h.message && h.message.includes('이미') ? '⚡' : '❌');
                // 메시지에서 이름 추출
                const nameMatch = h.message ? h.message.match(/^(.+?)님/) : null;
                const displayName = nameMatch ? nameMatch[1] : (h.id || '알 수 없음');

                return `
                    <div class="history-item">
                        <div class="history-icon">${icon}</div>
                        <div class="history-info">
                            <div class="history-name">${escapeHtml(displayName)}</div>
                            <div class="history-time">${h.time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearHistory() {
            history = [];
            scanCount = 0;
            sessionStorage.removeItem(storagePrefix + 'history');
            sessionStorage.removeItem(storagePrefix + 'count');
            updateScanCount();
            renderHistory();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 모달 밖 클릭 시 닫기 (설정 기능 제거됨)

        // ===== Audio Feedback =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playBeep() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.2);
            } catch (e) { /* audio not supported */ }
        }

        // ===== Toast =====
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position:fixed; left:50%; bottom:28px;
                    transform:translateX(-50%) translateY(16px);
                    background:rgba(255,255,255,0.95); color:#111;
                    border-radius:14px; padding:14px 20px;
                    box-shadow:0 8px 32px rgba(0,0,0,0.3);
                    opacity:0; transition:opacity .25s ease, transform .25s ease;
                    z-index:200; font-size:15px; font-weight:600;
                    font-family:var(--font);
                `;
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(16px)';
            }, 2000);
        }
    </script>
</body>
